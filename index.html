<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fuse Jumper" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>Fuse Jumper</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="game-wrapper">
      <div id="ctrl-left" class="ctrl-pad">
        <button class="ctrl-btn" id="btn-left" aria-label="Move left">&#9664;</button>
        <button class="ctrl-btn" id="btn-right" aria-label="Move right">&#9654;</button>
      </div>
      <div id="game-container"></div>
      <div id="ctrl-right" class="ctrl-pad">
        <button class="ctrl-btn" id="btn-jump" aria-label="Jump">&#9650;</button>
      </div>
      <div id="ctrl-dev">
        <button class="dev-btn" id="btn-level-1">1</button>
        <button class="dev-btn" id="btn-level-2">2</button>
        <button class="dev-btn" id="btn-level-3">3</button>
        <button class="dev-btn" id="btn-level-4">4</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
